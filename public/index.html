<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gerenciador de Produtos</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f4f7f6;
      color: #333;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    
    header {
      background-color: #4CAF50;
      width: 100%;
      padding: 20px 0;
      text-align: center;
      color: white;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }

    .container {
      width: 80%;
      max-width: 900px;
      margin-top: 30px;
    }

    .card {
      background: white;
      padding: 25px;
      border-radius: 8px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
      margin-bottom: 30px;
    }

    h2 { margin-top: 0; color: #4CAF50; }

    form {
      display: flex;
      flex-wrap: wrap;
      gap: 15px;
    }

    .input-group {
      flex: 1;
      min-width: 200px;
      display: flex;
      flex-direction: column;
    }

    label { font-size: 14px; margin-bottom: 5px; font-weight: bold; color: #666; }
    
    input {
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 5px;
      font-size: 14px;
      transition: all 0.3s;
    }

    input:focus { border-color: #4CAF50; outline: none; }

    button {
      background-color: #4CAF50;
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 5px;
      font-size: 14px;
      cursor: pointer;
      font-weight: bold;
      transition: background 0.3s;
      align-self: flex-end;
    }

    button:hover { background-color: #45a049; }
    
    .btn-danger { background-color: #f44336; }
    .btn-danger:hover { background-color: #da190b; }

    .btn-edit { background-color: #2196F3; margin-right: 5px; }
    .btn-edit:hover { background-color: #0b7dda; }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
    }

    th, td {
      text-align: left;
      padding: 12px;
      border-bottom: 1px solid #ddd;
    }

    th { background-color: #f8f9fa; color: #333; }
    
    .empty-state {
      text-align: center;
      padding: 30px;
      color: #999;
      font-style: italic;
    }
  </style>
</head>

<body>
  <header>
    <h1>🛒 Gestor de Produtos - API</h1>
  </header>

  <div class="container">
    
    <!-- Formulário de Criação -->
    <div class="card">
      <h2>+ Novo Produto</h2>
      <form id="productForm">
        <div class="input-group">
          <label for="nome">Nome do Produto</label>
          <input type="text" id="nome" name="nome" placeholder="Ex: Teclado Mecânico" required>
        </div>
        <div class="input-group">
          <label for="preco">Preço (R$)</label>
          <input type="number" step="0.01" id="preco" name="preco" placeholder="150.00" required>
        </div>
        <div class="input-group">
          <label for="estoque">Estoque Inicial</label>
          <input type="number" id="estoque" name="estoque" placeholder="10" required>
        </div>
        <div style="width: 100%; display: flex; justify-content: space-between; align-items: center; margin-top: 10px;">
          <div id="errorMessage" style="color: #d32f2f; font-weight: bold; font-size: 14px; display: none; padding: 10px; background: #ffebee; border-radius: 4px; border: 1px solid #ffcdd2;"></div>
          <div id="successMessage" style="color: #2e7d32; font-weight: bold; font-size: 14px; display: none; padding: 10px; background: #e8f5e9; border-radius: 4px; border: 1px solid #c8e6c9;"></div>
          <button type="submit" id="btnSalvar">Salvar Produto</button>
        </div>
      </form>
    </div>

    <!-- Tabela de Produtos -->
    <div class="card">
      <h2>Estoque Atual</h2>
      <table id="productsTable">
        <thead>
          <tr>
            <th>ID</th>
            <th>Nome</th>
            <th>Preço (R$)</th>
            <th>Em Estoque</th>
            <th style="width: 100px;">Ações</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <!-- JS INSERE PRODUTOS AQUI -->
        </tbody>
      </table>
      <div id="emptyMessage" class="empty-state">Nenhum produto cadastrado até o momento.</div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
